services:
  postgres:
    image: postgres:16-alpine
    container_name: elderaid-postgres
    environment:
      POSTGRES_DB: elderaid
      POSTGRES_USER: elderaid
      POSTGRES_PASSWORD: elderaid_dev_password
    ports:
      - "5432:5432"
    volumes:
      - elderaid_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U elderaid"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
    container_name: elderaid-backend
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      SPRING_PROFILES_ACTIVE: dev
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/elderaid
      SPRING_DATASOURCE_USERNAME: elderaid
      SPRING_DATASOURCE_PASSWORD: elderaid_dev_password
    ports:
      - "8080:8080"

volumes:
  elderaid_postgres_data:

spring:
  application:
    name: elderaid-backend
  profiles:
    active: dev

  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        format_sql: true

  flyway:
    enabled: true
    locations: classpath:db/migration

server:
  port: 8080

logging:
  level:
    org.hibernate.SQL: debug

app:
  jwt:
    secret: ${JWT_SECRET:dev-only-secret-replace-me-this-must-be-at-least-32-bytes-long}
    access-token-expiration-minutes: 15
    refresh-token-expiration-days: 7

spring:
  application:
    name: elderaid-backend
  profiles:
    active: dev

  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        format_sql: true

  flyway:
    enabled: true
    locations: classpath:db/migration

  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB

server:
  port: 8080

logging:
  level:
    org.hibernate.SQL: debug

app:
  jwt:
    secret: ${JWT_SECRET:dev-only-secret-replace-me-this-must-be-at-least-32-bytes-long}
    access-token-expiration-minutes: 15
    refresh-token-expiration-days: 7
  storage:
    upload-dir: ${UPLOAD_DIR:./uploads}
  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:5173}
  auth:
    # The refresh token cookie is Secure in production (HTTPS only) but must
    # be non-Secure for local http://localhost dev, or the browser silently
    # drops it. Overridden to true via env var in any real deployment.
    refresh-cookie-secure: ${REFRESH_COOKIE_SECURE:false}
    refresh-cookie-name: elderaid_refresh
